name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CMAKE_BUILD_PARALLEL_LEVEL: 4

jobs:
  path-check:
    name: C1 / no absolute personal paths
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Run path check
        run: bash tools/precommit_check_paths.sh

  windows:
    name: Windows / MSVC / vcpkg
    runs-on: windows-2022
    needs: path-check
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          # Must match (or exceed) the builtin-baseline pinned in
          # vcpkg.json — otherwise the manifest's version constraints
          # can't be resolved against the older port database.
          vcpkgGitCommitId: '7e99dc220963b470f61bd502e3fee50eda5c41ff'

      - name: Configure
        # lukka/run-vcpkg@v11 sets VCPKG_ROOT job-wide; the preset reads
        # it via $env{VCPKG_ROOT}. No need to forward anything.
        shell: pwsh
        run: |
          Write-Host "VCPKG_ROOT=$env:VCPKG_ROOT"
          cmake --preset windows-vcpkg

      - name: Build
        run: cmake --build build/windows-vcpkg --config Release

      - name: Smoke run --version
        run: .\build\windows-vcpkg\Release\tubelight.exe --version

      - name: Smoke run --help
        run: .\build\windows-vcpkg\Release\tubelight.exe --help

  # ---------------------------------------------------------------------------
  # Linux jobs are aspirational scaffolding for v1.1 (cross-platform parity).
  # They run on every push so we can iterate on the Linux build incrementally,
  # but failures don't break the CI status (continue-on-error). When the Linux
  # build is verified locally and CI passes consistently, drop the flag.
  # ---------------------------------------------------------------------------
  linux-gcc:
    name: Linux / gcc-13 (experimental)
    runs-on: ubuntu-24.04
    needs: path-check
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential cmake ninja-build pkg-config \
            libglfw3-dev libglm-dev libepoxy-dev libstb-dev nlohmann-json3-dev \
            libvulkan-dev vulkan-headers \
            libpipewire-0.3-dev \
            xvfb

      - name: Configure
        run: cmake --preset linux-ninja

      - name: Build
        run: cmake --build build/linux-ninja

      - name: Smoke run --version
        run: ./build/linux-ninja/tubelight --version

      - name: Smoke run --help
        run: ./build/linux-ninja/tubelight --help

      - name: Validate all bundled profiles (M4 + M5 + M8 gate)
        run: |
          set -e
          fail=0
          for f in profiles/crts/*.json profiles/signals/*.json; do
            if ! ./build/linux-ninja/tubelight --validate-profile "$f"; then
              fail=1
            fi
          done
          if [ "$fail" -ne 0 ]; then
            echo "::error::At least one profile failed validation"
            exit 1
          fi
          crt_count=$(ls profiles/crts/*.json | wc -l)
          sig_count=$(ls profiles/signals/*.json | wc -l)
          echo "CRT profiles: $crt_count (M4 requires >= 10)"
          echo "Signal profiles: $sig_count (M5 requires == 7)"
          if [ "$crt_count" -lt 10 ]; then echo "::error::M4 violated ($crt_count < 10)"; exit 1; fi
          if [ "$sig_count" -lt 7 ];  then echo "::error::M5 violated ($sig_count < 7)";  exit 1; fi

      - name: Smoke .slangp export
        run: |
          ./build/linux-ninja/tubelight --export-slangp /tmp/test.slangp \
            --profile pvm-8220 --signal composite_ntsc
          test -s /tmp/test.slangp
          head -20 /tmp/test.slangp
          grep -q "shaders = 8" /tmp/test.slangp

  linux-clang:
    name: Linux / clang-18 (experimental)
    runs-on: ubuntu-24.04
    needs: path-check
    continue-on-error: true
    env:
      CC: clang-18
      CXX: clang++-18
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            cmake ninja-build pkg-config \
            clang-18 \
            libglfw3-dev libglm-dev libepoxy-dev libstb-dev nlohmann-json3-dev \
            libvulkan-dev vulkan-headers \
            libpipewire-0.3-dev \
            xvfb

      - name: Configure
        run: cmake --preset linux-ninja

      - name: Build
        run: cmake --build build/linux-ninja

      - name: Smoke run --version
        run: ./build/linux-ninja/tubelight --version

      - name: Smoke run --help
        run: ./build/linux-ninja/tubelight --help
